# ============================================
# AliağaAI - Docker Compose
# Backend + (Opsiyonel Frontend)
# ============================================

version: '3.8'

services:
  # ==========================================
  # BACKEND - FastAPI
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aliagai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENV=production
    volumes:
      # Logs için
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aliagai-network
  # ==========================================
  # FRONTEND - (Sonra eklenecek)
  # ==========================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: aliagai-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - aliagai-network

networks:
  aliagai-network:
    driver: bridge

