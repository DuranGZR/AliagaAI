name: aliagai

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aliagai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aliagai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aliagai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aliagai_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aliagai} -d ${POSTGRES_DB:-aliagai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aliagai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aliagai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aliagai}:${POSTGRES_PASSWORD:-aliagai_secret}@postgres:5432/${POSTGRES_DB:-aliagai_db}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      COLLECTAPI_KEY: ${COLLECTAPI_KEY:-}
      DEBUG: ${DEBUG:-false}
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 45s
    networks:
      - aliagai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aliagai-frontend
    restart: unless-stopped
    ports:
      - "19006:19006"
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      EXPO_NO_TELEMETRY: "1"
    command: npm run start:docker
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aliagai-network

networks:
  aliagai-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  frontend_node_modules:
    driver: local
